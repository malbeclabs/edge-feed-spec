name: conformance ci

on:
  pull_request:
    paths:
      - "tools/conformance/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "tools/conformance/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: tools/conformance/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: tools/conformance

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: tools/conformance/go.sum

      - name: test
        working-directory: tools/conformance
        env:
          TMPDIR: /tmp
        run: go test ./...
