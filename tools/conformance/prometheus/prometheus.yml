# Self-contained conformance demo — scrapes only dz-conformance.
# Prometheus does not support env-var expansion, so the target port is
# hard-coded to match CONFORMANCE_METRICS_PORT's default (9094) in
# .env.example / docker-compose.yml. If you override that, update the target.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  # dz-conformance metrics (host-networked; default bind addr 127.0.0.1:9094)
  - job_name: dz-conformance
    static_configs:
      - targets: ["127.0.0.1:9094"]
